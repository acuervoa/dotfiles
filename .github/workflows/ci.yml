name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      include_untracked:
        description: "Run secrets scan on untracked files"
        required: false
        default: "false"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Repo checks
        run: bash ./scripts/check.sh

      - name: Secret scan (tracked files)
        run: bash ./scripts/check-secrets.sh

      - name: Secret scan (include untracked)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_untracked == 'true' }}
        run: bash ./scripts/check-secrets.sh --all
