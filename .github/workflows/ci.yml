name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Repo checks
        run: bash ./scripts/check.sh

      - name: Secret scan (tracked files)
        run: bash ./scripts/check-secrets.sh
