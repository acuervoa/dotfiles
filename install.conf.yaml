- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: [ '~' ]

- link:
    ~/.dotfiles:
        path: .
    ~/.bash_profile:
        path: runcom/bash_profile
    ~/.bashrc:
        path: runcom/bashrc
    ~/.inputrc:
        path: runcom/inputrc
    ~/.profile:
        path: runcom/profile
    ~/.gitconfig:
        path: git/gitconfig
    ~/.gitignore_global:
        path: git/gitignore_global
    ~/.system:
        path: system
    ~/.vim:
    ~/.vim/autoload:
        force: false
        path: meta/vim-pathogen/autoload
    ~/.vimrc:
        path: vim/vimrc
    ~/.hammerspoon:
    ~/.aliases:
        path: system/aliases
- shell:
  - [ git submodule update --init --recursive, "Installing submodules" ]
